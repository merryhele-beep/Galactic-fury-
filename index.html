<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GALACTIC FURY - Plasma Edition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
  canvas { image-rendering: pixelated; display: block; background: #000510; border: 2px solid #333; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;
canvas.width = W; canvas.height = H;

// ── SISTEMA DE TRANSPARENCIA PARA SPRITES ──────────────────────────────────
function makeTransparent(img) {
  try {
    const tmpCanvas = document.createElement('canvas');
    const tctx = tmpCanvas.getContext('2d');
    tmpCanvas.width = img.width; tmpCanvas.height = img.height;
    tctx.drawImage(img, 0, 0);
    const imgData = tctx.getImageData(0, 0, tmpCanvas.width, tmpCanvas.height);
    const data = imgData.data;
    for (let i = 0; i < data.length; i += 4) {
      if (data[i] > 230 && data[i+1] > 230 && data[i+2] > 230) data[i+3] = 0; 
    }
    tctx.putImageData(imgData, 0, 0);
    return tmpCanvas;
  } catch (e) { return img; }
}

// ── CARGA DE ASSETS ─────────────────────────────────────────────────────────
let imgShip = new Image(); let imgEnm = new Image(); 
let loaded = 0; let shipReady = false; let enmReady = false;

imgShip.onload = () => { imgShip = makeTransparent(imgShip); shipReady = true; loaded++; };
imgShip.onerror = () => { console.error("Error ship.png"); loaded++; };
imgShip.src = 'ship.png';

imgEnm.onload  = () => { imgEnm = makeTransparent(imgEnm); enmReady = true; loaded++; };
imgEnm.onerror = () => { console.error("Error enemies.png"); loaded++; };
imgEnm.src  = 'enemies.png';

// ── AUDIO BÁSICO ─────────────────────────────────────────────────────────────
let AC;
function initAudio() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); }
function snd(freq, dur) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.frequency.setValueAtTime(freq, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}

// ── VARIABLES DE JUEGO ───────────────────────────────────────────────────────
const S = { TITLE:0, PLAY:1, BOSS_WARN:2, GAMEOVER:3 };
let state = S.TITLE;
let score = 0, hiScore = +localStorage.getItem('hsc') || 0;
let level = 1, wave = 0, waveTimer = 100;
const pl = { x:80, y:220, w:64, h:40, hitW:24, hitH:16, spd:6, hp:5, inv:0, bullets:[] };
let enms = [], eBullets = [], parts = [], boss = null;

// ── LÓGICA DE DISPARO (LAS NUEVAS BALAS) ────────────────────────────────────
function spawnEBullet(ex, ey, tx, ty, isBoss = false) {
  const dx = tx - ex, dy = ty - ey;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const size = isBoss ? 28 : 20; // Tamaño aumentado
  eBullets.push({
    x: ex, y: ey,
    vx: (dx/dist) * (isBoss ? 6 : 4),
    vy: (dy/dist) * (isBoss ? 6 : 4),
    w: size, h: size,
    color: isBoss ? '#ff0044' : '#ffaa00',
    pulse: 0
  });
}

// ── ACTUALIZACIÓN ────────────────────────────────────────────────────────────
function update() {
  if (state !== S.PLAY) return;

  // Jugador
  if (pl.inv > 0) pl.inv--;
  if ((K.ArrowUp || K.KeyW) && pl.y > 5) pl.y -= pl.spd;
  if ((K.ArrowDown || K.KeyS) && pl.y < H - pl.h - 5) pl.y += pl.spd;
  if ((K.ArrowLeft || K.KeyA) && pl.x > 5) pl.x -= pl.spd;
  if ((K.ArrowRight || K.KeyD) && pl.x < W/2) pl.x += pl.spd;

  // Balas Jugador
  pl.bullets.forEach((b, i) => {
    b.x += 12;
    if (b.x > W) pl.bullets.splice(i, 1);
  });

  // Enemigos
  if (Math.random() < 0.02) {
    enms.push({ x: W+50, y: Math.random()*(H-50), w:52, h:44, hp:1, type: Math.floor(Math.random()*3), sCool: 60 });
  }

  enms.forEach((e, i) => {
    e.x -= 3;
    e.sCool--;
    if (e.sCool <= 0) {
      spawnEBullet(e.x, e.y+20, pl.x, pl.y+20);
      e.sCool = 100 + Math.random()*50;
    }
    // Colisión Bala -> Enemigo
    pl.bullets.forEach((b, bi) => {
      if (checkCol(b.x, b.y, 15, 5, e.x, e.y, e.w, e.h)) {
        enms.splice(i, 1); pl.bullets.splice(bi, 1);
        score += 100; snd(200, 0.1);
      }
    });
    if (e.x < -60) enms.splice(i, 1);
  });

  // Balas Enemigas (Lógica)
  eBullets.forEach((b, i) => {
    b.x += b.vx; b.y += b.vy;
    b.pulse += 0.15;
    if (b.x < -50 || b.x > W+50 || b.y < -50 || b.y > H+50) eBullets.splice(i, 1);
    
    // Colisión con jugador
    if (pl.inv === 0 && checkCol(pl.x+20, pl.y+10, 24, 20, b.x-b.w/2, b.y-b.h/2, b.w, b.h)) {
      eBullets.splice(i, 1);
      pl.hp--; pl.inv = 80;
      snd(100, 0.3);
      if (pl.hp <= 0) state = S.GAMEOVER;
    }
  });
}

function checkCol(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ── DIBUJO DE BALAS DE PLASMA (POR CÓDIGO) ──────────────────────────────────
function drawEBullets() {
  eBullets.forEach(b => {
    ctx.save();
    ctx.shadowBlur = 15 + Math.sin(b.pulse) * 8;
    ctx.shadowColor = b.color;
    
    // Efecto de esfera de energía
    const grad = ctx.createRadialGradient(b.x, b.y, 2, b.x, b.y, b.w / 2);
    grad.addColorStop(0, '#fff'); 
    grad.addColorStop(0.3, b.color);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    
    ctx.fillStyle = grad;
    ctx.beginPath();
    // La bala pulsa ligeramente de tamaño
    const pulseSize = (b.w / 2) + Math.sin(b.pulse) * 3;
    ctx.arc(b.x, b.y, pulseSize, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// ── RENDER PRINCIPAL ─────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = "#000510";
  ctx.fillRect(0, 0, W, H);

  if (state === S.TITLE) {
    ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "30px Courier New";
    ctx.fillText("GALACTIC FURY: PLASMA", W/2, H/2);
    ctx.font = "15px Courier New";
    ctx.fillText("PRESIONA ESPACIO PARA COMENZAR", W/2, H/2 + 40);
    return;
  }

  // Jugador
  if (shipReady && (pl.inv % 6 < 3)) {
    ctx.drawImage(imgShip, 0, 0, imgShip.width/5, imgShip.height, pl.x, pl.y, pl.w, pl.h);
  } else if (!shipReady) {
    ctx.fillStyle = "cyan"; ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
  }

  // Balas Jugador
  ctx.fillStyle = "yellow";
  pl.bullets.forEach(b => ctx.fillRect(b.x, b.y, 15, 4));

  // Enemigos
  if (enmReady) {
    enms.forEach(e => {
      ctx.drawImage(imgEnm, e.type*(imgEnm.width/4), (Math.floor(Date.now()/100)%2)*(imgEnm.height/3), imgEnm.width/4, imgEnm.height/3, e.x, e.y, e.w, e.h);
    });
  }

  // Dibujar las nuevas balas de plasma
  drawEBullets();

  // HUD
  ctx.fillStyle = "white"; ctx.textAlign = "left"; ctx.font = "18px Courier New";
  ctx.fillText(`SCORE: ${score}`, 20, 30);
  ctx.fillText(`HP: ${"❤️".repeat(pl.hp)}`, 20, 60);

  if (state === S.GAMEOVER) {
    ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = "red"; ctx.textAlign = "center"; ctx.font = "40px Courier New";
    ctx.fillText("GAME OVER", W/2, H/2);
    ctx.font = "15px Courier New"; ctx.fillStyle = "white";
    ctx.fillText("PRESIONA R PARA REINICIAR", W/2, H/2 + 40);
  }
}

// ── INPUTS Y BUCLE ───────────────────────────────────────────────────────────
const K = {};
window.onkeydown = e => { 
  K[e.code] = true; 
  if (e.code === 'Space') { initAudio(); state = S.PLAY; }
  if (e.code === 'KeyR' && state === S.GAMEOVER) location.reload();
  if (e.code === 'KeyZ' && state === S.PLAY) {
    pl.bullets.push({x: pl.x+pl.w, y: pl.y+pl.h/2});
    snd(600, 0.05);
  }
};
window.onkeyup = e => K[e.code] = false;

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
